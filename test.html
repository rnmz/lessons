<!DOCTYPE html>
<html>
<head>
    <title>Vibe Pong Royale</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .ui { display: flex; gap: 40px; margin-bottom: 20px; font-size: 50px; font-weight: 900; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        canvas { background: #000; border: 4px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1); transition: transform 0.05s; }
        .hint { margin-top: 20px; color: #555; }
    </style>
</head>
<body>
    <div class="ui"><span id="l">0</span> : <span id="r">0</span></div>
    <canvas id="pong" width="600" height="400"></canvas>
    <div class="hint">Двигай мышкой • Лови золото • Побеждай</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        socket.on('state', (data) => {
            // Эффект шлейфа (не стираем всё сразу)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Отрисовка бонуса
            if (data.powerUp.active) {
                ctx.fillStyle = '#ffd700';
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'gold';
                ctx.fillRect(data.powerUp.x, data.powerUp.y, 15, 15);
            }

            // Отрисовка мяча
            ctx.fillStyle = data.ball.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = data.ball.color;
            ctx.fillRect(data.ball.x - data.ball.size/2, data.ball.y - data.ball.size/2, data.ball.size, data.ball.size);

            // Отрисовка игроков
            Object.values(data.players).forEach(p => {
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                const x = p.side === 'left' ? 10 : 580;
                ctx.fillRect(x, p.y, 12, 80);
            });
            ctx.shadowBlur = 0;

            // Обновление UI
            document.getElementById('l').innerText = data.score.left;
            document.getElementById('r').innerText = data.score.right;

            // Тряска экрана при голе
            if (data.ball.x < 5 || data.ball.x > 595) {
                canvas.style.transform = `translate(${(Math.random()-0.5)*30}px, ${(Math.random()-0.5)*30}px)`;
            } else {
                canvas.style.transform = 'translate(0,0)';
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            socket.emit('move', e.clientY - rect.top - 40);
        });
    </script>
</body>
</html>
